services:
  - type: web
    name: sentinel-cameroon
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_PORT
        value: 3306
