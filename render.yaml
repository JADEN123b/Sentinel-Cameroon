services:
  - type: web
    name: sentinel-cameroon
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt
    envVars:
      # SQLite configuration
      - key: DB_PATH
        value: /var/www/html/database/data/sentinel_cameroon.sqlite
      # Enable Render detection
      - key: RENDER
        value: "true"
    # Persistent volume for SQLite database
    volumes:
      - path: /var/www/html/database/data
        name: sentinel-db-volume
    # Health check
    healthCheckPath: /
    # Build command override if needed
    buildCommand: |
      docker build -t sentinel-cameroon .
